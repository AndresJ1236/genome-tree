events {
  worker_connections 1024;
}

http {
  upstream app {
    server app:3000;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Internal subrequest used by auth_request to verify session cookie.
    # 'internal' makes it unreachable from outside; nginx calls it internally.
    location = /_auth_check {
      internal;
      proxy_pass              http://app/api/auth/media-check;
      proxy_pass_request_body off;
      proxy_set_header        Content-Length "";
      proxy_set_header        Host              $host;
      proxy_set_header        Cookie            $http_cookie;
      proxy_set_header        X-Forwarded-Proto https;
    }

    # Media files proxied from MinIO — requires valid session cookie
    location /media/ {
      auth_request /_auth_check;

      # On auth failure redirect to login instead of showing a blank 401
      error_page 401 = @media_login_required;

      proxy_pass         http://minio:9000/genome-tree/;
      proxy_set_header   Host minio;
      proxy_hide_header  x-amz-id-2;
      proxy_hide_header  x-amz-request-id;
      proxy_hide_header  Set-Cookie;
      proxy_ignore_headers Set-Cookie;
      # Private cache: each browser caches but CDN/proxies cannot
      add_header         Cache-Control "private, max-age=3600";
    }

    location @media_login_required {
      return 302 /login;
    }

    # Next.js app
    location / {
      proxy_pass         http://app;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
